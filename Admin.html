<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Lời Chúc – Huyền Trân & Anh Kiệt</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box }

    :root {
      --rose: #c8697a;
      --blush: #f2c4ce;
      --cream: #fdf6f0;
      --gold: #c9a96e;
      --deeprose: #9b3a4d;
      --text: #4a2030;
    }

    body { background: var(--cream); font-family: 'EB Garamond', serif; color: var(--text); min-height: 100vh; }

    /* LOGIN */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #fff5f7 0%, #fdf0f4 40%, #fce8ed 100%);
    }
    .login-box {
      background: rgba(255,255,255,.92); border: 1px solid var(--blush); border-radius: 20px;
      padding: 44px 36px; width: 90%; max-width: 360px; text-align: center;
      box-shadow: 0 12px 48px rgba(200,105,122,.12);
    }
    .login-icon { font-size: 36px; margin-bottom: 16px }
    .login-title { font-family: 'Great Vibes', cursive; font-size: 40px; color: var(--deeprose); margin-bottom: 4px }
    .login-sub { font-family: 'Cormorant Garamond', serif; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 28px }
    .login-input {
      width: 100%; padding: 12px 16px; border: 1px solid var(--blush); border-radius: 50px;
      font-family: 'EB Garamond', serif; font-size: 18px; color: var(--text);
      background: #fffafb; outline: none; text-align: center; letter-spacing: 6px;
      transition: border-color .3s, box-shadow .3s; margin-bottom: 16px;
    }
    .login-input:focus { border-color: var(--rose); box-shadow: 0 0 0 3px rgba(242,196,206,.35) }
    .login-btn {
      width: 100%; padding: 13px; background: linear-gradient(135deg, var(--deeprose), var(--rose));
      color: #fff; border: none; border-radius: 50px;
      font-family: 'Cormorant Garamond', serif; font-size: 14px; letter-spacing: 3px;
      text-transform: uppercase; cursor: pointer; transition: opacity .3s, transform .2s;
      box-shadow: 0 4px 20px rgba(155,58,77,.25);
    }
    .login-btn:hover { opacity: .9; transform: translateY(-2px) }
    .login-error { display: none; margin-top: 12px; font-family: 'Cormorant Garamond', serif; font-size: 14px; font-style: italic; color: #c0392b }

    /* ADMIN PANEL */
    #admin-panel { display: none }

    .admin-header {
      background: linear-gradient(135deg, var(--deeprose), var(--rose));
      padding: 28px 24px; text-align: center; color: #fff; position: relative;
    }
    .admin-header-title { font-family: 'Great Vibes', cursive; font-size: clamp(28px,6vw,42px); margin-bottom: 4px }
    .admin-header-sub { font-family: 'Cormorant Garamond', serif; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; opacity: .8 }

    .logout-btn {
      position: absolute; top: 20px; right: 16px;
      background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.4);
      border-radius: 20px; padding: 6px 14px; font-family: 'Cormorant Garamond', serif;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
      transition: background .2s;
    }
    .logout-btn:hover { background: rgba(255,255,255,.35) }

    .admin-body { max-width: 700px; margin: 0 auto; padding: 32px 20px 80px }

    /* Stats */
    .stats-bar { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap }
    .stat-card {
      flex: 1; min-width: 100px; background: #fff; border: 1px solid var(--blush);
      border-radius: 14px; padding: 16px 12px; text-align: center;
      box-shadow: 0 4px 16px rgba(200,105,122,.06);
    }
    .stat-number { font-family: 'Great Vibes', cursive; font-size: 38px; color: var(--deeprose); line-height: 1 }
    .stat-label { font-family: 'Cormorant Garamond', serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-top: 4px }

    /* Toolbar */
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center }
    .toolbar-btn {
      padding: 8px 18px; border-radius: 50px; border: 1px solid var(--blush);
      background: #fff; font-family: 'Cormorant Garamond', serif; font-size: 12px;
      letter-spacing: 2px; text-transform: uppercase; color: var(--rose); cursor: pointer; transition: all .2s;
    }
    .toolbar-btn:hover { background: var(--rose); color: #fff; border-color: var(--rose) }
    .toolbar-btn.danger:hover { background: #c0392b; border-color: #c0392b }
    .search-box {
      flex: 1; min-width: 180px; padding: 8px 16px; border: 1px solid var(--blush); border-radius: 50px;
      font-family: 'EB Garamond', serif; font-size: 14px; color: var(--text);
      background: #fffafb; outline: none; transition: border-color .3s;
    }
    .search-box:focus { border-color: var(--rose) }

    /* Wishes list */
    .wishes-list { display: flex; flex-direction: column; gap: 14px }
    .wish-item {
      background: #fff; border: 1px solid #f2dde4; border-radius: 14px; padding: 18px 20px;
      box-shadow: 0 4px 16px rgba(200,105,122,.06); transition: box-shadow .2s;
    }
    .wish-item:hover { box-shadow: 0 6px 24px rgba(200,105,122,.12) }
    .wish-item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px }
    .wish-name { font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); flex: 1 }
    .wish-date { font-size: 11px; color: #c0a0a8; letter-spacing: 1px; white-space: nowrap }
    .wish-msg { font-family: 'EB Garamond', serif; font-size: 15px; color: var(--text); line-height: 1.8 }

    .wish-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 12px; border-top: 1px solid #f5e8ec }
    .act-btn {
      padding: 5px 14px; border-radius: 20px; border: 1px solid;
      font-family: 'Cormorant Garamond', serif; font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: all .2s;
    }
    .act-edit   { border-color: var(--gold); color: var(--gold); background: transparent }
    .act-edit:hover   { background: var(--gold); color: #fff }
    .act-delete { border-color: #e8a0a8; color: #c0392b; background: transparent }
    .act-delete:hover { background: #c0392b; color: #fff; border-color: #c0392b }

    /* Edit inline */
    .edit-area { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f5e8ec }
    .edit-name-input, .edit-msg-input {
      width: 100%; padding: 10px 14px; border: 1px solid var(--blush); border-radius: 8px;
      font-family: 'EB Garamond', serif; font-size: 14px; color: var(--text);
      background: #fffafb; outline: none; transition: border-color .3s; margin-bottom: 10px;
    }
    .edit-name-input:focus, .edit-msg-input:focus { border-color: var(--rose) }
    .edit-msg-input { resize: vertical; min-height: 80px }
    .edit-save-btn, .edit-cancel-btn {
      padding: 6px 16px; border-radius: 20px; border: none;
      font-family: 'Cormorant Garamond', serif; font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; margin-right: 8px;
    }
    .edit-save-btn   { background: var(--rose); color: #fff }
    .edit-cancel-btn { background: #f0e0e4; color: var(--text) }

    /* Empty / Loading */
    .empty-state, .loading-state {
      text-align: center; padding: 60px 20px;
      font-family: 'Cormorant Garamond', serif; font-size: 16px; font-style: italic; color: var(--blush);
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--deeprose); color: #fff; padding: 12px 24px; border-radius: 50px;
      font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: 1px;
      box-shadow: 0 6px 24px rgba(155,58,77,.3);
      transition: transform .4s cubic-bezier(.22,1,.36,1); z-index: 9999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0) }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(74,32,48,.45); backdrop-filter: blur(4px);
      z-index: 9000; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex }
    .modal-box {
      background: #fff; border: 1px solid var(--blush); border-radius: 20px;
      padding: 36px 28px; width: 90%; max-width: 340px; text-align: center;
      box-shadow: 0 16px 48px rgba(155,58,77,.2);
    }
    .modal-icon  { font-size: 32px; margin-bottom: 12px }
    .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--deeprose); margin-bottom: 8px }
    .modal-msg   { font-family: 'EB Garamond', serif; font-size: 14px; color: #9a6070; line-height: 1.7; margin-bottom: 24px }
    .modal-actions { display: flex; gap: 10px }
    .modal-cancel, .modal-confirm {
      flex: 1; padding: 10px; border-radius: 50px; border: none;
      font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: opacity .2s;
    }
    .modal-cancel  { background: #f0e0e4; color: var(--text) }
    .modal-confirm { background: #c0392b; color: #fff }
    .modal-cancel:hover, .modal-confirm:hover { opacity: .85 }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <div class="login-title">Admin</div>
    <div class="login-sub">Quản lý lời chúc</div>
    <input class="login-input" type="password" id="pw-input"
           placeholder="••••" maxlength="30"
           onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">✦ Đăng Nhập ✦</button>
    <div class="login-error" id="login-error">⚠️ Mật khẩu không đúng</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-header">
    <button class="logout-btn" onclick="doLogout()">Đăng Xuất</button>
    <div class="admin-header-title">Quản Lý Lời Chúc</div>
    <div class="admin-header-sub">Huyền Trân &amp; Anh Kiệt · 25.05.2026</div>
  </div>

  <div class="admin-body">
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-number" id="stat-total">–</div>
        <div class="stat-label">Tổng Lời Chúc</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-today">–</div>
        <div class="stat-label">Hôm Nay</div>
      </div>
    </div>

    <div class="toolbar">
      <input class="search-box" type="text" id="search-box"
             placeholder="🔍  Tìm tên hoặc nội dung…"
             oninput="renderList()">
      <button class="toolbar-btn" onclick="loadAndRender()">↺ Làm Mới</button>
      <button class="toolbar-btn danger" onclick="confirmDeleteAll()">🗑 Xóa Tất Cả</button>
    </div>

    <div id="wishes-list" class="wishes-list">
      <div class="loading-state">Đang tải…</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-icon"  id="modal-icon">🗑️</div>
    <div class="modal-title" id="modal-title">Xóa lời chúc?</div>
    <div class="modal-msg"   id="modal-msg">Bạn có chắc không?</div>
    <div class="modal-actions">
      <button class="modal-cancel"  onclick="closeModal()">Hủy</button>
      <button class="modal-confirm" id="modal-confirm-btn">Xóa</button>
    </div>
  </div>
</div>

<script>
  /* ── CONFIG: đổi mật khẩu ở đây ── */
  const ADMIN_PASSWORD = '1234';
  const STORAGE_KEY    = 'wishes_huyentran_anhkiet_2026';
  const SESSION_KEY    = 'admin_hk2026';

  /* ── AUTH ── */
  function doLogin() {
    const val = document.getElementById('pw-input').value;
    if (val === ADMIN_PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display  = 'block';
      loadAndRender();
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  function doLogout() {
    sessionStorage.removeItem(SESSION_KEY);
    location.reload();
  }

  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display  = 'block';
  }

  /* ── STORAGE ── */
  async function loadWishes() {
    try {
      const r = await window.storage.get(STORAGE_KEY, true);
      return r ? JSON.parse(r.value) : [];
    } catch { return []; }
  }

  async function saveWishes(list) {
    await window.storage.set(STORAGE_KEY, JSON.stringify(list), true);
  }

  /* ── STATE ── */
  let allWishes = [];

  async function loadAndRender() {
    document.getElementById('wishes-list').innerHTML =
      '<div class="loading-state">Đang tải lời chúc…</div>';
    allWishes = await loadWishes();
    updateStats();
    renderList();
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = allWishes.length;
    const now = new Date();
    const dd = String(now.getDate()).padStart(2,'0');
    const mm = String(now.getMonth()+1).padStart(2,'0');
    const yy = now.getFullYear();
    const todayPart = `${dd}/${mm}/${yy}`;
    const cnt = allWishes.filter(w => w.date && w.date.includes(todayPart)).length;
    document.getElementById('stat-today').textContent = cnt;
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
  }

  function renderList() {
    const q = (document.getElementById('search-box').value || '').toLowerCase();
    const container = document.getElementById('wishes-list');

    const filtered = allWishes.map((w, i) => ({ w, i })).filter(({ w }) =>
      !q || (w.name||'').toLowerCase().includes(q) || (w.msg||'').toLowerCase().includes(q)
    );

    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state">${q ? '🔍 Không tìm thấy kết quả' : '🌸 Chưa có lời chúc nào'}</div>`;
      return;
    }

    container.innerHTML = '';
    [...filtered].reverse().forEach(({ w, i }) => {
      const el = document.createElement('div');
      el.className = 'wish-item';
      el.innerHTML = `
        <div class="wish-item-header">
          <div class="wish-name">${esc(w.name)}</div>
          <div class="wish-date">${esc(w.date)}</div>
        </div>
        <div class="wish-msg">${esc(w.msg)}</div>
        <div class="wish-actions">
          <button class="act-btn act-edit"   onclick="startEdit(${i})">✎ Sửa</button>
          <button class="act-btn act-delete" onclick="confirmDelete(${i})">✕ Xóa</button>
        </div>
        <div class="edit-area" id="edit-${i}">
          <input  class="edit-name-input" id="en-${i}" placeholder="Tên" maxlength="60">
          <textarea class="edit-msg-input" id="em-${i}" maxlength="400"></textarea>
          <button class="edit-save-btn"   onclick="saveEdit(${i})">Lưu</button>
          <button class="edit-cancel-btn" onclick="cancelEdit(${i})">Hủy</button>
        </div>
      `;
      container.appendChild(el);
    });
  }

  /* ── EDIT ── */
  function startEdit(i) {
    document.getElementById(`edit-${i}`).style.display = 'block';
    document.getElementById(`en-${i}`).value = allWishes[i].name;
    document.getElementById(`em-${i}`).value = allWishes[i].msg;
  }
  function cancelEdit(i) {
    document.getElementById(`edit-${i}`).style.display = 'none';
  }
  async function saveEdit(i) {
    const name = document.getElementById(`en-${i}`).value.trim();
    const msg  = document.getElementById(`em-${i}`).value.trim();
    if (!name || !msg) return;
    allWishes[i].name = name;
    allWishes[i].msg  = msg;
    await saveWishes(allWishes);
    cancelEdit(i);
    renderList();
    showToast('✓ Đã lưu thay đổi');
  }

  /* ── DELETE ── */
  let pendingIdx = null;

  function confirmDelete(i) {
    pendingIdx = i;
    document.getElementById('modal-icon').textContent  = '🗑️';
    document.getElementById('modal-title').textContent = 'Xóa lời chúc?';
    document.getElementById('modal-msg').textContent   = `Xóa lời chúc của "${allWishes[i].name}"? Không thể hoàn tác.`;
    document.getElementById('modal-confirm-btn').onclick = doDelete;
    document.getElementById('modal').classList.add('show');
  }

  function confirmDeleteAll() {
    if (!allWishes.length) { showToast('Không có lời chúc nào'); return; }
    document.getElementById('modal-icon').textContent  = '⚠️';
    document.getElementById('modal-title').textContent = 'Xóa tất cả?';
    document.getElementById('modal-msg').textContent   = `Xóa toàn bộ ${allWishes.length} lời chúc? Không thể hoàn tác.`;
    document.getElementById('modal-confirm-btn').onclick = doDeleteAll;
    document.getElementById('modal').classList.add('show');
  }

  function closeModal() { document.getElementById('modal').classList.remove('show') }

  async function doDelete() {
    closeModal();
    allWishes.splice(pendingIdx, 1);
    await saveWishes(allWishes);
    updateStats(); renderList();
    showToast('🗑 Đã xóa lời chúc');
  }

  async function doDeleteAll() {
    closeModal();
    allWishes = [];
    await saveWishes([]);
    updateStats(); renderList();
    showToast('🗑 Đã xóa tất cả');
  }

  /* ── TOAST ── */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  /* ── INIT ── */
  if (sessionStorage.getItem(SESSION_KEY) === '1') loadAndRender();
</script>
</body>
</html>
